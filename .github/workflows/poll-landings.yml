# Workflow: Poll Landings
#
# Ejecuta el script de polling cada 15 minutos para detectar nuevos deploys
# en los repositorios de la organización HV-DEV-HTML y actualizar el archivo
# data/landings.json.
#
# También se puede ejecutar manualmente via workflow_dispatch para forzar
# una actualización inmediata (útil durante desarrollo o debugging).
#
# Secretos requeridos (settings → secrets and variables → actions):
#   GH_PAT                   — Personal Access Token con scope "repo" para leer la org
#   NOTIFY_SECRET            — Secret compartido con el endpoint /api/notify en Vercel
#   NOTIFY_URL               — URL base de la app deployada (ej: https://tracking.vercel.app)
#   UPSTASH_REDIS_REST_URL   — Endpoint REST de Upstash Redis (mismo valor que en Vercel)
#   UPSTASH_REDIS_REST_TOKEN — Token REST de Upstash Redis (mismo valor que en Vercel)
#
# El script escribe las landings directamente en Redis: ya NO se commitea
# data/landings.json, así que el dashboard ve los cambios sin rebuild de Vercel.
#
# @module .github/workflows/poll-landings

name: Poll Landings

on:
  # ---------------------------------------------------------------------------
  # Trigger programado: cada 15 minutos
  # ---------------------------------------------------------------------------
  schedule:
    - cron: '*/15 * * * *'

  # ---------------------------------------------------------------------------
  # Trigger manual: permite ejecutar desde la UI de GitHub Actions
  # ---------------------------------------------------------------------------
  workflow_dispatch:

jobs:
  poll:
    name: Poll landings
    runs-on: ubuntu-latest

    # -------------------------------------------------------------------------
    # Variables de entorno para el script
    # -------------------------------------------------------------------------
    env:
      GH_PAT: ${{ secrets.GH_PAT }}
      NOTIFY_URL: ${{ secrets.NOTIFY_URL }}
      NOTIFY_SECRET: ${{ secrets.NOTIFY_SECRET }}
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout del repositorio (para tener scripts/ y package.json)
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v5

      # -----------------------------------------------------------------------
      # 2. Setup Node.js 22 LTS
      # -----------------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      # -----------------------------------------------------------------------
      # 3. Instalar dependencias (octokit está en dependencies)
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: |
          corepack enable
          pnpm install --prod

      # -----------------------------------------------------------------------
      # 4. Ejecutar el script de polling
      # -----------------------------------------------------------------------
      # El script escribe los cambios directamente en Upstash Redis. No hay
      # paso de commit/push: el dashboard lee de Redis y ve los cambios al
      # instante, sin disparar un rebuild de Vercel.
      - name: Run poll script
        id: poll
        run: node scripts/poll.mjs
